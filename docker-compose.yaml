services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: avito-server
    environment:
      PORT: 8080
    ports:
      - '8080:8080'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: avito-client
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_OLLAMA_URL: http://ollama:11434/api/generate
      VITE_OLLAMA_MODEL: llama3
    ports:
      - '5173:5173'
    depends_on:
      - server
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: avito-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama:/root/.ollama
    command: ["bash", "-lc", "ollama serve & sleep 2 && ollama pull llama3 && wait"]

volumes:
  ollama:
